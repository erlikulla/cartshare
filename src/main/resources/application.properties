# Web Server Configuration
server.port=8080

# Database Connection (H2 In-Memory Database)
spring.datasource.url=jdbc:h2:mem:cartsharedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate / JPA Settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Enables a visual web dashboard so you can see your tables inside your browser
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Tell Spring Boot to allow web browser access to the console fields
spring.h2.console.settings.web-allow-others=true